<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFD93B">
<title>五十音不靠背</title>
<style>
:root {
  --yellow: #FFD93B;
  --red: #FF6B5B;
  --teal: #2BB3A3;
  --purple: #8E6FC0;
  --ink: #2b2b2b;
  --paper: #FFFDF5;
  --card: #ffffff;
  --nav-h: 64px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: "Yu Gothic", "Hiragino Sans", "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: #efe9d8;
  color: var(--ink);
  display: flex; justify-content: center;
}
#app {
  width: 100%; max-width: 480px; min-height: 100dvh;
  background: var(--paper);
  background-image: radial-gradient(#ffd93b55 4px, transparent 4px);
  background-size: 80px 80px;
  display: flex; flex-direction: column;
  position: relative;
  box-shadow: 0 0 30px rgba(0,0,0,.15);
}
/* App Bar */
.appbar {
  position: sticky; top: 0; z-index: 20;
  background: var(--yellow);
  border-bottom: 3px solid var(--ink);
  padding: calc(10px + env(safe-area-inset-top)) 16px 10px;
  display: flex; align-items: center; gap: 12px;
}
.appbar img { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--ink); object-fit: cover; }
.appbar .t1 { font-size: 1.15rem; font-weight: 800; letter-spacing: .08em; }
.appbar .t1 span { color: var(--red); }
.appbar .t2 { font-size: .7rem; color: #6b5a00; }
.appbar .spk-test {
  margin-left: auto; border: 2px solid var(--ink); background: var(--card);
  border-radius: 50%; width: 38px; height: 38px; font-size: 1.1rem; cursor: pointer;
}
/* 主內容 */
main { flex: 1; padding: 14px 14px calc(var(--nav-h) + env(safe-area-inset-bottom) + 20px); }
.panel { display: none; }
.panel.active { display: block; animation: fadein .22s; }
@keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

/* 底部分頁列 */
.tabbar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; z-index: 30;
  height: calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  background: var(--card); border-top: 3px solid var(--ink);
  display: flex;
}
.tabbar button {
  flex: 1; border: none; background: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  font-family: inherit; font-size: .7rem; font-weight: 700; color: #999;
}
.tabbar button .ico { font-size: 1.45rem; line-height: 1; }
.tabbar button.active { color: var(--ink); }
.tabbar button.active .ico { transform: translateY(-2px); }
.tabbar button.active::after {
  content: ""; width: 26px; height: 4px; border-radius: 2px; background: var(--red); margin-top: 2px;
}

/* 區塊切換籤 (segmented chips) */
.chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 10px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chips button {
  border: 2px solid var(--ink); background: var(--card); border-radius: 999px;
  padding: 7px 14px; font-size: .85rem; font-weight: 700; cursor: pointer;
  white-space: nowrap; font-family: inherit; flex-shrink: 0;
}
.chips button.on { background: var(--teal); color: #fff; }
.chips.warm button.on { background: var(--red); }

.mode-toggle { display: flex; justify-content: center; margin-bottom: 12px; }
.mode-toggle button {
  border: 2px solid var(--ink); background: var(--card); padding: 7px 20px;
  cursor: pointer; font-weight: 700; font-family: inherit; font-size: .9rem;
}
.mode-toggle button:first-child { border-radius: 10px 0 0 10px; }
.mode-toggle button:last-child { border-radius: 0 10px 10px 0; border-left: none; }
.mode-toggle button.on { background: var(--purple); color: #fff; }

/* 假名格 */
.kgrid { display: grid; gap: 7px; }
.kgrid.c5 { grid-template-columns: repeat(5, 1fr); }
.kgrid.c3 { grid-template-columns: repeat(3, 1fr); }
.kgrid .cell {
  background: var(--card); border: 2px solid var(--ink);
  border-radius: 12px; aspect-ratio: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer; user-select: none;
}
.kgrid.c3 .cell { aspect-ratio: 1.6; }
.kgrid .cell:active { background: var(--yellow); transform: scale(.95); }
.kgrid .cell .k { font-size: clamp(1.2rem, 5.6vw, 1.7rem); font-weight: 700; }
.kgrid.c3 .cell .k { font-size: clamp(1.1rem, 5vw, 1.5rem); }
.kgrid .cell .r { font-size: .62rem; color: #999; }
.kgrid .blank { visibility: hidden; }
.row-label { grid-column: 1 / -1; font-size: .75rem; font-weight: 700; color: #b09a20; margin-top: 4px; }

/* 底部彈出詳情 */
.sheet-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 40;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; bottom: 0; left: 50%; transform: translate(-50%, 105%);
  width: 100%; max-width: 480px; z-index: 50;
  background: var(--card); border: 3px solid var(--ink); border-bottom: none;
  border-radius: 22px 22px 0 0; padding: 14px 18px calc(20px + env(safe-area-inset-bottom));
  transition: transform .3s cubic-bezier(.2,.9,.3,1);
  max-height: 78dvh; overflow-y: auto;
}
.sheet.open { transform: translate(-50%, 0); }
.sheet .grab { width: 44px; height: 5px; border-radius: 3px; background: #ddd; margin: 0 auto 12px; }
.sheet .row1 { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.evolve { display: flex; align-items: center; gap: 8px; font-weight: 700; }
.evolve .src {
  font-size: 1.9rem; background: var(--yellow); border-radius: 12px;
  min-width: 58px; height: 58px; padding: 0 8px;
  display: flex; align-items: center; justify-content: center;
}
.evolve .arrow { font-size: 1.2rem; color: var(--red); }
.evolve .dst { font-size: 2.1rem; }
.play-btn {
  border: 2px solid var(--ink); background: var(--teal); color: #fff;
  border-radius: 999px; padding: 8px 18px; font-size: 1rem; font-weight: 700;
  cursor: pointer; font-family: inherit; margin-left: auto;
}
.play-btn:active { transform: scale(.95); }
.sheet .romaji-line { margin-top: 8px; color: var(--teal); font-weight: 700; font-size: 1.05rem; }
.sheet .note { margin-top: 8px; color: #555; font-size: .9rem; line-height: 1.75; }
.sheet .examples { margin-top: 12px; display: flex; flex-direction: column; gap: 7px; }
.ex {
  background: var(--paper); border-left: 5px solid var(--red);
  padding: 9px 12px; border-radius: 0 10px 10px 0; font-size: .9rem;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.ex .jp { font-weight: 700; }
.ex .kana-r { color: var(--purple); }
.ex .zh { color: #777; }
.ex .mini-play {
  margin-left: auto; border: 2px solid var(--ink); background: var(--card);
  border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: .85rem; flex-shrink: 0;
}

/* 翻卡 */
.flash-area { text-align: center; }
.flash-tip { margin-bottom: 14px; color: #666; font-size: .9rem; }
.flashcard { width: min(320px, 88%); height: 290px; margin: 0 auto; perspective: 1000px; cursor: pointer; }
.flashcard .inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d; transition: transform .5s;
}
.flashcard.flipped .inner { transform: rotateY(180deg); }
.flashcard .face {
  position: absolute; inset: 0; backface-visibility: hidden;
  background: var(--card); border: 3px solid var(--ink); border-radius: 22px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  box-shadow: 5px 5px 0 var(--teal); padding: 16px;
}
.flashcard .front .kanji { font-size: 4.6rem; font-weight: 700; }
.flashcard .front .hint { color: #999; margin-top: 14px; font-size: .85rem; }
.flashcard .back { transform: rotateY(180deg); box-shadow: 5px 5px 0 var(--red); }
.flashcard .back .pair { font-size: 3rem; font-weight: 700; }
.flashcard .back .romaji { color: var(--teal); font-size: 1.15rem; font-weight: 700; margin: 6px 0; }
.flashcard .back .note { font-size: .8rem; color: #666; line-height: 1.65; }
.flash-ctrl { margin-top: 16px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn {
  border: 3px solid var(--ink); background: var(--card); border-radius: 14px;
  padding: 11px 18px; font-size: .95rem; font-weight: 700; cursor: pointer;
  box-shadow: 3px 3px 0 var(--ink); font-family: inherit;
}
.btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
.btn.primary { background: var(--red); color: #fff; }
.btn.teal { background: var(--teal); color: #fff; }
.flash-progress { margin-top: 10px; color: #888; font-size: .85rem; }

/* 配對 */
.match-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
.match-head .stat { font-weight: 700; font-size: .9rem; }
.match-tip { color: #666; font-size: .82rem; margin-bottom: 10px; }
.match-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.mcard {
  aspect-ratio: 3/4; border: 3px solid var(--ink); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(1.2rem, 6vw, 1.8rem); font-weight: 700; cursor: pointer;
  background: var(--purple); color: var(--purple); user-select: none;
  transition: background .2s, color .2s; position: relative;
}
.mcard.open { background: var(--card); color: var(--ink); }
.mcard.done { background: var(--yellow); color: var(--ink); border-style: dashed; cursor: default; }
.mcard .tag {
  position: absolute; top: 5px; left: 7px; font-size: .6rem; color: #aaa; font-weight: 400; visibility: hidden;
}
.mcard.open .tag, .mcard.done .tag { visibility: visible; }
.match-win { margin-top: 14px; text-align: center; font-size: 1.05rem; font-weight: 700; color: var(--teal); }

/* 測驗 */
.quiz-box {
  background: var(--card); border: 3px solid var(--ink); border-radius: 18px;
  padding: 20px; box-shadow: 5px 5px 0 var(--purple); text-align: center;
}
.quiz-q { font-size: 1rem; color: #666; margin-bottom: 10px; }
.quiz-big { font-size: 3.8rem; font-weight: 700; margin-bottom: 14px; min-height: 1.2em; }
.quiz-big button.hear {
  border: 3px solid var(--ink); background: var(--yellow); border-radius: 50%;
  width: 84px; height: 84px; font-size: 2rem; cursor: pointer;
}
.quiz-opts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; }
.quiz-opts button {
  border: 3px solid var(--ink); border-radius: 12px; background: var(--paper);
  font-size: 1.3rem; font-weight: 700; padding: 14px 6px; cursor: pointer; font-family: inherit;
}
.quiz-opts button:active { background: var(--yellow); }
.quiz-opts button.right { background: var(--teal); color: #fff; }
.quiz-opts button.wrong { background: var(--red); color: #fff; }
.quiz-meta { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 700; font-size: .9rem; }
.quiz-meta .streak { color: var(--red); }
.quiz-result .score { font-size: 3rem; font-weight: 700; color: var(--red); margin: 10px 0; }
.quiz-fb { min-height: 1.6em; margin-top: 10px; font-weight: 700; font-size: .95rem; }
.quiz-range { margin: 12px 0 16px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
.quiz-range label {
  display: flex; align-items: center; gap: 8px; font-size: .9rem; font-weight: 700;
  background: var(--paper); border: 2px solid var(--ink); border-radius: 10px; padding: 9px 12px; cursor: pointer;
}
.quiz-range input { width: 18px; height: 18px; accent-color: var(--red); }
footer { text-align: center; padding: 8px 0 4px; color: #bbb; font-size: .7rem; }
</style>
</head>
<body>
<div id="app">
  <div class="appbar">
    <img src="assets/hero.png" alt="" onerror="this.style.display='none'">
    <div>
      <div class="t1">五十音<span>不靠背</span></div>
      <div class="t2">認得字源,假名不用死背</div>
    </div>
    <button class="spk-test" id="spkTest" title="測試發音">🔊</button>
  </div>

  <main>
    <!-- 五十音表 -->
    <section id="table" class="panel active">
      <div class="chips" id="setChips">
        <button data-set="seion" class="on">清音</button>
        <button data-set="dakuon">濁音</button>
        <button data-set="handakuon">半濁音</button>
        <button data-set="yoon">拗音</button>
      </div>
      <div class="mode-toggle">
        <button id="hiraBtn" class="on">平假名</button><button id="kataBtn">片假名</button>
      </div>
      <div id="gridArea"></div>
    </section>

    <!-- 字源翻卡 -->
    <section id="flash" class="panel">
      <div class="flash-area">
        <div class="chips warm" id="deckChips">
          <button data-deck="seion" class="on">清音字源</button>
          <button data-deck="dakuon">濁音・半濁音</button>
          <button data-deck="yoon">拗音</button>
        </div>
        <p class="flash-tip" id="flashTip">這個漢字變成了哪個假名?想一想,再點卡片翻面。</p>
        <div class="flashcard" id="flashcard">
          <div class="inner">
            <div class="face front">
              <div class="kanji" id="flashKanji"></div>
              <div class="hint">點一下翻面</div>
            </div>
            <div class="face back">
              <div class="pair" id="flashPair"></div>
              <div class="romaji" id="flashRomaji"></div>
              <div class="note" id="flashNote"></div>
            </div>
          </div>
        </div>
        <div class="flash-ctrl">
          <button class="btn" id="flashPrev">上一張</button>
          <button class="btn teal" id="flashPlay">🔊 發音</button>
          <button class="btn primary" id="flashNext">下一張</button>
        </div>
        <div class="flash-ctrl">
          <button class="btn" id="flashShuffle">洗牌</button>
        </div>
        <div class="flash-progress" id="flashProgress"></div>
      </div>
    </section>

    <!-- 字源配對 -->
    <section id="match" class="panel">
      <p class="match-tip">翻開兩張卡,把「字源漢字」和它變成的「平假名」配成對!</p>
      <div class="match-head">
        <span class="stat">步數:<span id="matchMoves">0</span></span>
        <button class="btn" id="matchRestart">重新開始</button>
      </div>
      <div class="match-grid" id="matchGrid"></div>
      <div class="match-win" id="matchWin"></div>
    </section>

    <!-- 測驗 -->
    <section id="quiz" class="panel">
      <div class="quiz-box" id="quizBox">
        <div id="quizStart">
          <h2 style="margin-bottom:8px">十題挑戰</h2>
          <p style="color:#666;font-size:.9rem">混合出題:讀音、平片假名互認、字源、聽力。</p>
          <div class="quiz-range">
            <label><input type="checkbox" id="rangeSeion" checked disabled>清音(必選)</label>
            <label><input type="checkbox" id="rangeDakuon">濁音・半濁音</label>
            <label><input type="checkbox" id="rangeYoon">拗音</label>
          </div>
          <p style="color:#666;font-size:.9rem">最佳紀錄:<b id="bestScore">—</b></p>
          <br>
          <button class="btn primary" id="quizGo">開始測驗</button>
        </div>
        <div id="quizPlay" hidden>
          <div class="quiz-meta">
            <span>第 <span id="quizNum">1</span> / 10 題</span>
            <span class="streak" id="quizStreak"></span>
          </div>
          <div class="quiz-q" id="quizQ"></div>
          <div class="quiz-big" id="quizBig"></div>
          <div class="quiz-opts" id="quizOpts"></div>
          <div class="quiz-fb" id="quizFb"></div>
        </div>
        <div id="quizDone" class="quiz-result" hidden>
          <h2>測驗結束!</h2>
          <div class="score"><span id="finalScore"></span> / 10</div>
          <p id="finalMsg" style="color:#666;font-size:.92rem"></p>
          <br>
          <button class="btn primary" id="quizAgain">再玩一次</button>
        </div>
      </div>
    </section>
    <footer>取材自《五十音不靠背:學過一次記得一輩子的假名課》(神奇裘莉 著)</footer>
  </main>

  <!-- 底部分頁列 -->
  <div class="tabbar">
    <button data-panel="table" class="active"><span class="ico">🗾</span>五十音表</button>
    <button data-panel="flash"><span class="ico">🎴</span>字源翻卡</button>
    <button data-panel="match"><span class="ico">🧩</span>配對</button>
    <button data-panel="quiz"><span class="ico">✏️</span>測驗</button>
  </div>

  <!-- 詳情底部彈出卡 -->
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="sheet"><div class="grab"></div><div id="sheetBody"></div></div>
</div>

<script>
/* ===================== 資料 ===================== */
const KANA = [
{romaji:"a",hiragana:"あ",katakana:"ア",hiraSource:"安",hiraNote:"由「安」的草書轉變而來",kataSource:"阿",kataNote:"「阿」去掉右邊的「可」,阝簡化成兩筆",examples:[{jp:"安心",kana:"あんしん",romaji:"anshin",zh:"安心"},{jp:"安静",kana:"あんせい",romaji:"ansei",zh:"病人靜養休息"},{jp:"安全",kana:"あんぜん",romaji:"anzen",zh:"安全"}]},
{romaji:"i",hiragana:"い",katakana:"イ",hiraSource:"以",hiraNote:"由「以」的草書轉變而來",kataSource:"伊",kataNote:"「伊」去掉右邊的「尹」,只留亻偏旁",examples:[{jp:"可愛い",kana:"かわいい",romaji:"kawaii",zh:"可愛(卡哇伊)"},{jp:"美味しい",kana:"おいしい",romaji:"oishii",zh:"好吃(喔伊細)"},{jp:"以来",kana:"いらい",romaji:"irai",zh:"以來"}]},
{romaji:"u",hiragana:"う",katakana:"ウ",hiraSource:"宇",hiraNote:"由「宇」的草書轉變而來",kataSource:"宇",kataNote:"取「宇」的寶蓋頭宀的部分",examples:[{jp:"宇宙",kana:"うちゅう",romaji:"uchū",zh:"宇宙(多指外太空)"},{jp:"宇宙人",kana:"うちゅうじん",romaji:"uchūjin",zh:"外星人"},{jp:"うどん",kana:"うどん",romaji:"udon",zh:"烏龍麵"}]},
{romaji:"e",hiragana:"え",katakana:"エ",hiraSource:"衣",hiraNote:"由「衣」的草書轉變而來",kataSource:"江",kataNote:"取「江」右半部的「工」字",examples:[{jp:"円",kana:"えん",romaji:"en",zh:"日圓"},{jp:"援助",kana:"えんじょ",romaji:"enjo",zh:"援助"},{jp:"江戸",kana:"えど",romaji:"edo",zh:"東京的舊地名"}]},
{romaji:"o",hiragana:"お",katakana:"オ",hiraSource:"於",hiraNote:"由「於」的草書轉變而來",kataSource:"於",kataNote:"取「於」左半邊「方」字再簡化",examples:[{jp:"お茶",kana:"おちゃ",romaji:"ocha",zh:"茶"},{jp:"温泉",kana:"おんせん",romaji:"onsen",zh:"溫泉"},{jp:"おばさん",kana:"おばさん",romaji:"obasan",zh:"歐巴桑"}]},
{romaji:"ka",hiragana:"か",katakana:"カ",hiraSource:"加",hiraNote:"源自「加」,右邊一點是口演變而來",kataSource:"加",kataNote:"取「加」左半部的「力」字",examples:[{jp:"加法",kana:"かほう",romaji:"kahō",zh:"加法"},{jp:"看板",kana:"かんばん",romaji:"kanban",zh:"廣告招牌(臺語砍棒)"},{jp:"カラオケ",kana:"カラオケ",romaji:"karaoke",zh:"卡拉OK"}]},

// 濁音/半濁音:由清音加「゛」「゜」衍生
function mk(base, romaji, hira, kata, mark) {
  const b = byRomaji[base];
  return { romaji, hiragana: hira, katakana: kata, base, mark,
    derived: true,
    note: `「${b.hiragana}」加上${mark === "゛" ? "濁點(゛)" : "半濁點(゜)"}就變成「${hira}」,發音由 ${b.romaji} 轉為${mark === "゛" ? "濁音" : "半濁音"} ${romaji}。` };
}
const DAKUON = [
  mk("ka","ga","が","ガ","゛"), mk("ki","gi","ぎ","ギ","゛"), mk("ku","gu","ぐ","グ","゛"), mk("ke","ge","げ","ゲ","゛"), mk("ko","go","ご","ゴ","゛"),
  mk("sa","za","ざ","ザ","゛"), mk("shi","ji","じ","ジ","゛"), mk("su","zu","ず","ズ","゛"), mk("se","ze","ぜ","ゼ","゛"), mk("so","zo","ぞ","ゾ","゛"),
  mk("ta","da","だ","ダ","゛"), mk("chi","ji (di)","ぢ","ヂ","゛"), mk("tsu","zu (du)","づ","ヅ","゛"), mk("te","de","で","デ","゛"), mk("to","do","ど","ド","゛"),
  mk("ha","ba","ば","バ","゛"), mk("hi","bi","び","ビ","゛"), mk("fu","bu","ぶ","ブ","゛"), mk("he","be","べ","ベ","゛"), mk("ho","bo","ぼ","ボ","゛")

// 拗音:い段假名 + 小寫や/ゆ/よ
const YOON_BASES = [
  ["ki","ky"], ["shi","sh"], ["chi","ch"], ["ni","ny"], ["hi","hy"], ["mi","my"], ["ri","ry"]
];
const YOON_VOICED = [
  ["gi","gy","ぎ","ギ"], ["ji","j","じ","ジ"], ["bi","by","び","ビ"], ["pi","py","ぴ","ピ"]
];
const SMALL = [["ゃ","ャ","a"], ["ゅ","ュ","u"], ["ょ","ョ","o"]];
const YOON = [];
for (const [base, prefix] of YOON_BASES) {
  const b = byRomaji[base];
  for (const [sh, sk, v] of SMALL) {
    YOON.push({ romaji: prefix + v, hiragana: b.hiragana + sh, katakana: b.katakana + sk,
      base, mark: sh, derived: true,
      note: `「${b.hiragana}」加上小寫的「${sh}」,兩個假名拼成一拍,唸作 ${prefix + v}。` });
  }
}
for (const [vr, prefix, vh, vk] of YOON_VOICED) {
  for (const [sh, sk, v] of SMALL) {
    YOON.push({ romaji: prefix + v, hiragana: vh + sh, katakana: vk + sk,
      base: vr, mark: sh, derived: true,
      note: `濁音/半濁音「${vh}」加上小寫的「${sh}」,唸作 ${prefix + v}。` });
  }
}

let jaVoice = null;
function pickVoice() {
  const vs = speechSynthesis.getVoices().filter(v => v.lang.startsWith("ja"));
  jaVoice = vs.find(v => /Kyoko|O-?Ren|Otoya|Google/i.test(v.name)) || vs[0] || null;
}
if ("speechSynthesis" in window) {
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text, rate = 0.85) {
  if (!("speechSynthesis" in window)) { alert("此瀏覽器不支援語音播放"); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP";
  if (jaVoice) u.voice = jaVoice;
  u.rate = rate;
  speechSynthesis.speak(u);
}
$("spkTest").addEventListener("click", () => speak("あいうえお"));

/* ===================== 分頁切換 ===================== */
document.querySelectorAll(".tabbar button").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".tabbar button").forEach(x => x.classList.toggle("active", x === b));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === b.dataset.panel));
  window.scrollTo({ top: 0 });
}));

/* ===================== 五十音表 ===================== */
const ROWS_SEION = [
  ["あ行", ["a","i","u","e","o"]],
  ["か行", ["ka","ki","ku","ke","ko"]],
  ["さ行", ["sa","shi","su","se","so"]],
  ["た行", ["ta","chi","tsu","te","to"]],
  ["な行", ["na","ni","nu","ne","no"]],
  ["は行", ["ha","hi","fu","he","ho"]],
  ["ま行", ["ma","mi","mu","me","mo"]],
  ["や行", ["ya",null,"yu",null,"yo"]],
  ["ら行", ["ra","ri","ru","re","ro"]],
  ["わ行", ["wa",null,null,null,"wo"]],
  ["撥音", ["n",null,null,null,null]]
];
let showKata = false, curSet = "seion";
function cellHTML(k) {
  return `<div class="k">${showKata ? k.katakana : k.hiragana}</div><div class="r">${k.romaji}</div>`;
}
function renderTable() {
  const area = $("gridArea");
  area.innerHTML = "";
  const grid = document.createElement("div");
  if (curSet === "seion") {
    grid.className = "kgrid c5";
    for (const [label, row] of ROWS_SEION) {
      const lab = document.createElement("div");
      lab.className = "row-label"; lab.textContent = label;
      grid.appendChild(lab);
      for (const r of row) {
        const cell = document.createElement("div");
        if (!r) { cell.className = "cell blank"; grid.appendChild(cell); continue; }
        const k = byRomaji[r];
        cell.className = "cell";
        cell.innerHTML = cellHTML(k);
        cell.addEventListener("click", () => openSheet(k));
        grid.appendChild(cell);
      }
    }
  } else {
    const list = SETS[curSet].list;
    grid.className = curSet === "yoon" ? "kgrid c3" : "kgrid c5";
    for (const k of list) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.innerHTML = cellHTML(k);
      cell.addEventListener("click", () => openSheet(k));
      grid.appendChild(cell);
    }
  }
  area.appendChild(grid);
}
document.querySelectorAll("#setChips button").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll("#setChips button").forEach(x => x.classList.toggle("on", x === b));
  curSet = b.dataset.set;
  renderTable();
}));
$("hiraBtn").addEventListener("click", function() {
  showKata = false; this.classList.add("on"); $("kataBtn").classList.remove("on"); renderTable();
});
$("kataBtn").addEventListener("click", function() {
  showKata = true; this.classList.add("on"); $("hiraBtn").classList.remove("on"); renderTable();
});
renderTable();

/* ===================== 詳情底部彈出卡 ===================== */
function openSheet(k) {
  const body = $("sheetBody");
  if (!k.derived) {
    body.innerHTML = `
      <div class="row1">
        <div class="evolve"><div class="src">${k.hiraSource}</div><div class="arrow">➜</div><div class="dst">${k.hiragana}</div></div>
        <div class="evolve"><div class="src">${k.kataSource}</div><div class="arrow">➜</div><div class="dst">${k.katakana}</div></div>
        <button class="play-btn" data-say="${k.hiragana}">🔊 ${k.romaji}</button>
      </div>
      <div class="note">平假名「${k.hiragana}」:${k.hiraNote}。<br>片假名「${k.katakana}」:${k.kataNote}。</div>
      <div class="examples">${k.examples.map(e =>
        `<div class="ex"><span class="jp">${e.jp}</span><span class="kana-r">${e.kana} (${e.romaji})</span><span class="zh">${e.zh}</span><button class="mini-play" data-say="${e.kana}">🔊</button></div>`).join("")}
      </div>`;
  } else {
    const b = byRomaji[k.base];
    body.innerHTML = `
      <div class="row1">
        <div class="evolve"><div class="src">${b ? b.hiragana : ""} + ${k.mark}</div><div class="arrow">➜</div><div class="dst">${k.hiragana} / ${k.katakana}</div></div>
        <button class="play-btn" data-say="${k.hiragana}">🔊 ${k.romaji}</button>
      </div>
      <div class="romaji-line">${k.romaji}</div>
      <div class="note">${k.note}</div>`;
  }
  body.querySelectorAll("[data-say]").forEach(btn =>
    btn.addEventListener("click", () => speak(btn.dataset.say)));
  $("sheet").classList.add("open");
  $("sheetBackdrop").classList.add("open");
  speak(k.hiragana);
}
function closeSheet() {
  $("sheet").classList.remove("open");
  $("sheetBackdrop").classList.remove("open");
}
$("sheetBackdrop").addEventListener("click", closeSheet);

/* ===================== 字源翻卡 ===================== */
const DECKS = {
  seion: { list: KANA, tip: "這個漢字變成了哪個假名?想一想,再點卡片翻面。" },
  dakuon: { list: [...DAKUON, ...HANDAKUON], tip: "清音加上「゛」或「゜」變成什麼音?點卡片翻面。" },
  yoon: { list: YOON, tip: "假名加上小寫的ゃゅょ怎麼唸?點卡片翻面。" }
};
let curDeck = "seion", deck = shuffle(KANA), deckIdx = 0;
const fc = $("flashcard");
function renderFlash() {
  const k = deck[deckIdx];
  fc.classList.remove("flipped");
  if (!k.derived) {
    $("flashKanji").textContent = k.hiraSource;
    $("flashNote").innerHTML = `${k.hiraNote}。<br>片假名「${k.katakana}」← ${k.kataSource}:${k.kataNote}。`;
  } else {
    const b = byRomaji[k.base];
    $("flashKanji").textContent = `${b ? b.hiragana : ""} + ${k.mark}`;
    $("flashNote").textContent = k.note;
  }
  $("flashPair").textContent = `${k.hiragana} / ${k.katakana}`;
  $("flashRomaji").textContent = k.romaji;
  $("flashProgress").textContent = `${deckIdx + 1} / ${deck.length}`;
}
fc.addEventListener("click", () => {
  fc.classList.toggle("flipped");
  if (fc.classList.contains("flipped")) speak(deck[deckIdx].hiragana);
});
$("flashNext").addEventListener("click", () => { deckIdx = (deckIdx + 1) % deck.length; renderFlash(); });
$("flashPrev").addEventListener("click", () => { deckIdx = (deckIdx - 1 + deck.length) % deck.length; renderFlash(); });
$("flashShuffle").addEventListener("click", () => { deck = shuffle(DECKS[curDeck].list); deckIdx = 0; renderFlash(); });
$("flashPlay").addEventListener("click", () => speak(deck[deckIdx].hiragana));
document.querySelectorAll("#deckChips button").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll("#deckChips button").forEach(x => x.classList.toggle("on", x === b));
  curDeck = b.dataset.deck;
  $("flashTip").textContent = DECKS[curDeck].tip;
  deck = shuffle(DECKS[curDeck].list); deckIdx = 0;
  renderFlash();
}));
renderFlash();

/* ===================== 字源配對 ===================== */
const mGrid = $("matchGrid");
let mOpen = [], mLock = false, mMoves = 0, mDone = 0, mTotal = 8;
function newMatch() {
  mOpen = []; mLock = false; mMoves = 0; mDone = 0;
  $("matchMoves").textContent = "0";
  $("matchWin").textContent = "";
  const picks = shuffle(KANA).slice(0, mTotal);
  const cards = shuffle(picks.flatMap(k => [
    { id: k.romaji, label: k.hiraSource, tag: "字源" },
    { id: k.romaji, label: k.hiragana, tag: "假名" }
  ]));
  mGrid.innerHTML = "";
  cards.forEach(c => {
    const el = document.createElement("div");
    el.className = "mcard";
    el.innerHTML = `<span class="tag">${c.tag}</span>${c.label}`;
    el.dataset.id = c.id;
    el.addEventListener("click", () => flipCard(el));
    mGrid.appendChild(el);
  });
}
function flipCard(el) {
  if (mLock || el.classList.contains("open") || el.classList.contains("done")) return;
  el.classList.add("open");
  mOpen.push(el);
  if (mOpen.length < 2) return;
  mMoves++;
  $("matchMoves").textContent = mMoves;
  const [a, b] = mOpen;
  if (a.dataset.id === b.dataset.id) {
    a.classList.replace("open", "done"); b.classList.replace("open", "done");
    speak(byRomaji[a.dataset.id].hiragana);
    mOpen = []; mDone++;
    if (mDone === mTotal) $("matchWin").textContent = `全部配對成功!共用了 ${mMoves} 步 🎉`;
  } else {
    mLock = true;
    setTimeout(() => { a.classList.remove("open"); b.classList.remove("open"); mOpen = []; mLock = false; }, 800);
  }
}
$("matchRestart").addEventListener("click", newMatch);
newMatch();

/* ===================== 測驗 ===================== */
// 題型:big 為畫面大字;audio 題型改放播放鈕
const QTYPES = [
  { pool: "all", q: k => ({ prompt: "這個平假名怎麼唸?", big: k.hiragana, answer: k.romaji, optOf: x => x.romaji }) },
  { pool: "all", q: k => ({ prompt: "羅馬拼音對應哪個平假名?", big: k.romaji, answer: k.hiragana, optOf: x => x.hiragana }) },
  { pool: "all", q: k => ({ prompt: "這個片假名怎麼唸?", big: k.katakana, answer: k.romaji, optOf: x => x.romaji }) },
  { pool: "base", q: k => ({ prompt: `漢字「${k.hiraSource}」演變成哪個平假名?`, big: k.hiraSource, answer: k.hiragana, optOf: x => x.hiragana }) },
  { pool: "all", q: k => ({ prompt: "找出對應的片假名", big: k.hiragana, answer: k.katakana, optOf: x => x.katakana }) },
  { pool: "all", q: k => ({ prompt: "聽發音,選出正確的平假名", audio: k.hiragana, answer: k.hiragana, optOf: x => x.hiragana }) }
];
let quiz = [], qIdx = 0, qScore = 0, qStreak = 0;
function loadBest() { $("bestScore").textContent = localStorage.getItem("gojuon-best") ?? "—"; }
function quizPool() {
  let pool = [...KANA];
  if ($("rangeDakuon").checked) pool = pool.concat(DAKUON, HANDAKUON);
  if ($("rangeYoon").checked) pool = pool.concat(YOON);
  return pool;
}
function startQuiz() {
  const pool = quizPool();
  quiz = shuffle(pool).slice(0, 10).map(k => {
    const types = QTYPES.filter(t => t.pool === "all" || !k.derived);
    const t = types[Math.floor(Math.random() * types.length)].q(k);
    const wrong = shuffle(pool.filter(x => x !== k && t.optOf(x) !== t.optOf(k))).slice(0, 3).map(t.optOf);
    return { ...t, kana: k, options: shuffle([t.answer, ...wrong]) };
  });
  qIdx = 0; qScore = 0; qStreak = 0;
  $("quizStart").hidden = true; $("quizDone").hidden = true; $("quizPlay").hidden = false;
  renderQ();
}
function renderQ() {
  const q = quiz[qIdx];
  $("quizNum").textContent = qIdx + 1;
  $("quizStreak").textContent = qStreak >= 2 ? `🔥 連對 ${qStreak}` : "";
  $("quizQ").textContent = q.prompt;
  const big = $("quizBig");
  if (q.audio) {
    big.innerHTML = `<button class="hear">🔊</button>`;
    big.querySelector(".hear").addEventListener("click", () => speak(q.audio));
    speak(q.audio);
  } else {
    big.textContent = q.big;
  }
  $("quizFb").textContent = "";
  const box = $("quizOpts");
  box.innerHTML = "";
  q.options.forEach(opt => {
    const b = document.createElement("button");
    b.textContent = opt;
    b.addEventListener("click", () => answer(b, opt, q));
    box.appendChild(b);
  });
}
function answer(btn, opt, q) {
  if (q.answered) return;
  q.answered = true;
  const ok = opt === q.answer;
  if (ok) { qScore++; qStreak++; btn.classList.add("right"); $("quizFb").textContent = "答對了!"; $("quizFb").style.color = "var(--teal)"; }
  else {
    qStreak = 0; btn.classList.add("wrong");
    [...$("quizOpts").children].find(b => b.textContent === q.answer).classList.add("right");
    $("quizFb").textContent = `正確答案是「${q.answer}」`; $("quizFb").style.color = "var(--red)";
  }
  if (!q.audio) speak(q.kana.hiragana);
  setTimeout(() => { qIdx++; qIdx < quiz.length ? renderQ() : endQuiz(); }, 1000);
}
function endQuiz() {
  $("quizPlay").hidden = true; $("quizDone").hidden = false;
  $("finalScore").textContent = qScore;
  const best = Number(localStorage.getItem("gojuon-best") ?? -1);
  if (qScore > best) localStorage.setItem("gojuon-best", qScore);
  $("finalMsg").textContent =
    qScore === 10 ? "滿分!五十音真的不用靠背了!" :
    qScore >= 7 ? "很棒!再多翻幾次字源卡就能滿分。" :
    "沒關係,回到「字源翻卡」多看幾輪,漢字會幫你記住假名。";
  loadBest();
}
$("quizGo").addEventListener("click", startQuiz);
$("quizAgain").addEventListener("click", () => { $("quizDone").hidden = true; $("quizStart").hidden = false; });
loadBest();
</script>
